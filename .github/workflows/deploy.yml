name: Deploy to cPanel

# Playwright tests are disabled for automatic runs (team request) — use manual workflow for E2E when needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  EMAIL_USER: ${{ secrets.EMAIL_USER }}
  EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASS: ${{ secrets.DB_PASS }}
  REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

concurrency:
  group: deploy-to-cpanel
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      frontend-hash: ${{ steps.hash.outputs.frontend }}
      backend-hash: ${{ steps.hash.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Compute changed tree hashes
        id: hash
        run: |
          if [ -d frontend ]; then
            frontend_hash=$(git rev-list --objects HEAD -- frontend | git hash-object --stdin 2>/dev/null || echo "")
            echo "frontend=$frontend_hash" >> $GITHUB_OUTPUT
          else
            echo "frontend=" >> $GITHUB_OUTPUT
          fi
          if [ -d backend ]; then
            backend_hash=$(git rev-list --objects HEAD -- backend | git hash-object --stdin 2>/dev/null || echo "")
          else
            backend_hash=""
          fi
          # Include utils dir changes so deploy triggers when utils/ changes
          if [ -d utils ]; then
            utils_hash=$(git rev-list --objects HEAD -- utils | git hash-object --stdin 2>/dev/null || echo "")
            backend_hash="${backend_hash}${utils_hash}"
          fi
          echo "backend=$backend_hash" >> $GITHUB_OUTPUT
      - name: Create frontend artifact
        if: steps.hash.outputs.frontend != ''
        run: |
          set -e
          cd frontend
          zip -r ../frontend-artifact.zip \
            package.json package-lock.json index.html public src \
            .env.production vite.config.mjs postcss.config.js tailwind.config.js || true
      - name: Create backend artifact
        if: steps.hash.outputs.backend != ''
        run: |
          set -e
          cd backend
          # Include backend files and both backend/utils and repo-root utils so helpers like readingScorer are deployed
          zip -r ../backend-artifact.zip \
            server.js db.js logger.js routes models middlewares modules scripts package.json package-lock.json \
            utils ../utils || true
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deploy-artifacts
          path: |
            frontend-artifact.zip
            backend-artifact.zip

  frontend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: deploy-artifacts
          path: .
      - name: Unpack frontend
        if: needs.prepare.outputs.frontend-hash != ''
        run: |
          unzip -o frontend-artifact.zip -d frontend || true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
      - name: Install & Build Frontend
        run: |
          cd frontend
          cp .env.production .env
          npm ci --prefer-offline --no-audit --no-progress || exit 1
          npm run build --no-progress || exit 1
        env:
          CI: false
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Deploy Frontend
        env:
          FTP_HOST: ftp.star-siec.edu.vn
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<'LFTP_CMDS'
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 20
          set ftp:passive-mode true
          set ssl:verify-certificate no
          mkdir -p /ix.star-siec.edu.vn/frontend/build/
          mirror -R --delete --verbose=1 --parallel=4 \
            -x '(^|/).*\.map$' \
            -x '(^|/).*\.txt$' \
            -x '(^|/)LICENSE$' \
            -x '(^|/).*\.webp$' \
            -x '(^|/).*\.svg$' \
            frontend/dist/ /ix.star-siec.edu.vn/frontend/build/
          bye
          LFTP_CMDS

  backend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: deploy-artifacts
          path: .
      - name: Unpack backend
        if: needs.prepare.outputs.backend-hash != ''
        run: |
          unzip -o backend-artifact.zip -d backend-temp || true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
      - name: Prepare backend package
        if: needs.prepare.outputs.backend-hash != ''
        run: |
          set -e
          # Build .env from GitHub Secrets (never use committed env files)
          echo "NODE_ENV=production" > backend-temp/.env
          echo "PORT=5000" >> backend-temp/.env
          echo "DB_HOST=${{ env.DB_HOST }}" >> backend-temp/.env
          echo "DB_NAME=${{ env.DB_NAME }}" >> backend-temp/.env
          echo "DB_USER=${{ env.DB_USER }}" >> backend-temp/.env
          echo "DB_PASS=${{ env.DB_PASS }}" >> backend-temp/.env
          echo "EMAIL_USER=${{ env.EMAIL_USER }}" >> backend-temp/.env
          echo "EMAIL_PASS=${{ env.EMAIL_PASS }}" >> backend-temp/.env
          echo "EMAIL_TO=${{ env.EMAIL_TO }}" >> backend-temp/.env
          echo "REACT_APP_API_URL=${{ env.REACT_APP_API_URL }}" >> backend-temp/.env
          echo "OPENAI_API_KEY=${{ env.OPENAI_API_KEY }}" >> backend-temp/.env
          echo "GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}" >> backend-temp/.env
          echo "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}" >> backend-temp/.env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> backend-temp/.env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> backend-temp/.env
          echo "✅ .env built from GitHub Secrets"

          # Copy utils/ (if present at repo root) into package so modules like readingScorer are deployed
          if [ -d "utils" ]; then
            cp -r utils backend-temp/utils
            echo "✅ Copied utils into backend-temp"
          fi

          # Also copy backend/utils into package (some projects keep helpers inside backend/)
          if [ -d "backend/utils" ]; then
            cp -r backend/utils backend-temp/utils
            echo "✅ Copied backend/utils into backend-temp"
          fi

          ls -la backend-temp || true
      - name: Deploy Backend
        env:
          FTP_HOST: ftp.star-siec.edu.vn
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<'LFTP_CMDS'
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 20
          set ftp:passive-mode true
          set ssl:verify-certificate no
          mkdir -p /ix.star-siec.edu.vn/backend/
          mirror -R --delete --verbose=1 --parallel=4 \
            -x '(^|/)(node_modules|uploads)(/|$)' \
            -x '(^|/).*\.map$' \
            -x '(^|/).*\.md$' \
            -x '(^|/)package-lock\.json$' \
            backend-temp/ /ix.star-siec.edu.vn/backend/
          bye
          LFTP_CMDS
      - name: Notify Manual Restart
        run: |
          echo "✅ Backend đã được deploy lên cPanel."
          echo "📌 Vui lòng đăng nhập vào cPanel → Setup Node.js App → chọn app → nhấn Restart để khởi động lại server."

      - name: Post-deploy smoke check (non-blocking)
        run: |
          echo "⏱️ Running post-deploy smoke check (non-blocking) against /api/reading-tests"
          set +e
          status=$(curl -s -o /dev/null -w "%{http_code}" https://ix.star-siec.edu.vn/api/reading-tests || echo "000")
          echo "Smoke check HTTP status: $status"
          if [ "$status" = "200" ]; then
            echo "✅ Smoke check OK"
          else
            echo "⚠️ Smoke check returned $status. If you just restarted the app, wait a few seconds and re-run checks."
          fi
          set -e
